---
fixtures:
  repositories:
    ds389: https://github.com/simp/pupmod-simp-ds389.git
    pki: https://github.com/simp/pupmod-simp-pki.git
    selinux: https://github.com/simp/pupmod-simp-selinux.git
    simplib: https://github.com/simp/pupmod-simp-simplib.git
    stdlib: https://github.com/simp/puppetlabs-stdlib.git
    systemd: https://github.com/simp/puppet-systemd.git
    vox_selinux:
      repo: https://github.com/simp/pupmod-voxpupuli-selinux.git
      branch: simp-master

    # This needs to be in place for the rspec-puppet Hiera 5 hook to work
    # No idea why, it may be because Puppet sees a custom backend and loads all
    # of the global parts.
  # puppet_fixtures (via voxpupuli-test) does not interpolate the old
  # "#{source_dir}" tokens, and because a symlinks: block is present it will not
  # auto-create the module self-symlink either. Targets are written relative to
  # the link location (spec/fixtures/modules/).
  symlinks:
    simpkv: "../../.."
    test_plugins1: "../../support/modules/test_plugins1"
    test_plugins2: "../../support/modules/test_plugins2"
    simpkv_test: "../../support/modules/simpkv_test"
